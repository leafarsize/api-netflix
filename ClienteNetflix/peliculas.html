<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Consumir API REST</title>

    <style>
        * {
            grid-template-columns: repeat(4, 1fr);
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #222;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            background: black;
            color: #fff;
            padding: 20px 30px;
        }

        nav h1 {
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 1px;
            color: #e50914;
        }

        .navbar .logo {
            font-weight: bold;
            font-size: 1.7rem;
        }

        .navbar .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .navbar .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .navbar .nav-links a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .navbar .nav-links a.active {
            background: red;
            color: #fff;
        }

        /* CONTENEDOR PRINCIPAL */
        main {
            width: 600px;
            max-width: 90%;
            margin: 30px auto;
        }

        h1 {
            text-align: center;
            color: red;
            font-weight: bold;

        }

        h2 {
            color: gray;
            font-weight: bold;

            border-bottom: 2px solid black;
            padding-bottom: 5px;
        }

        /* VISTAS (Guardar / Eliminar / Editar) */
        .vista {
            display: none;
        }

        .vista.activa {
            display: block;
        }

        /* FORMULARIO */
        form {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        input {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid lightgray;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: black;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.25);
        }

        button {
            padding: 10px 15px;
            margin: 10px 0;
            cursor: pointer;
            background: red;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button:hover {
            background: lightgray;
        }

        #btnConsultar {
            background: red;
        }

        #btnConsultar:hover {
            background: lightgray;
        }

        .btn-eliminar {
            background: red;
        }

        .btn-eliminar:hover {
            background: lightgray;
        }

        hr {
            border: none;
            border-top: 1px solid #d1d5db;
            margin: 25px 0;
        }

        /* BUSCADOR */
        .buscador-wrap {
            position: relative;
            margin-top: 10px;
        }

        .buscador-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: #9ca3af;
        }

        #buscador {
            padding-left: 38px;
            margin: 10px 0;
        }

        .grid-peliculas {
            list-style: none;
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .grid-peliculas li {
            background: #1e1e1e;
            color: #f5f5f5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .grid-peliculas li:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        .portada-pelicula {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .info-pelicula {
            padding: 12px 14px;
        }

        .info-pelicula strong {
            font-size: 1.1rem;
            display: block;
            margin-bottom: 6px;
        }

        .info-pelicula span {
            display: block;
            font-size: 0.85rem;
            color: #bbbbbb;
            margin-bottom: 2px;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <h1>API NETFLIX</h1>

        <ul class="nav-links">
            <li><a href="#" class="active" data-vista="consultar">CONSULTAR</a></li>
            <li><a href="#" class="guardar" data-vista="guardar">GUARDAR</a></li>
            <li><a href="#" data-vista="eliminar">ELIMINAR</a></li>
            <li><a href="#" data-vista="editar">EDITAR</a></li>
            <li><a href="Index.html">REGRESAR</a></li>

        </ul>
    </nav>

    <main>

        <h1>Películas</h1>

        <section id="vista-consultar" class="vista activa">

            <!--============VISTA: Consultar============-->

            <hr>

            <button id="btnConsultar">Consultar películas</button>

            <!-- BARRA DE BÚSQUEDA -->
            <div class="buscador-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="buscador" placeholder="Buscar por título o género...">
            </div>

            <ul id="listaPeliculas" class="grid-peliculas"></ul>
            <p id="sinResultados" class="sin-resultados" style="display:none;">No se encontraron películas.</p>
        </section>



        <!-- ============ VISTA: GUARDAR ============ -->
        <section id="vista-guardar" class="vista activa">

            <h2>Registrar película</h2>

            <form id="formulario">

                <input type="text" id="titulo" placeholder="Título" required>
                <input type="text" id="genero" placeholder="Género" required>
                <input type="number" id="año" placeholder="Año" required>
                <input type="number" id="duracion" placeholder="Duración" required>
                <input type="text" id="idioma" placeholder="Idioma" required>
                <input type="number" id="calificacion" placeholder="Calificación" min="0" max="10" step="0.1" required>
                <input type="text" id="nc" placeholder="Clasificación (NC)" required>

                <button type="submit">Guardar película</button>

            </form>

        </section>

        <!-- ============ VISTA: ELIMINAR ============ -->
        <section id="vista-eliminar" class="vista">

            <h2>Eliminar película</h2>

            <form id="formularioEliminar">

                <input type="text" id="idEliminar" placeholder="ID o título de la película" required>

                <button type="submit" class="btn-eliminar">Eliminar película</button>

            </form>

        </section>

        <!-- ============ VISTA: EDITAR ============ -->
        <section id="vista-editar" class="vista">

            <h2>Editar película</h2>

            <form id="formularioEditar">

                <input type="text" id="idEditar" placeholder="ID de la película a editar" required>
                <input type="text" id="tituloEditar" placeholder="Nuevo título">
                <input type="text" id="generoEditar" placeholder="Nuevo género">
                <input type="number" id="añoEditar" placeholder="Nuevo año">
                <input type="number" id="duracionEditar" placeholder="Nueva duración">
                <input type="text" id="idiomaEditar" placeholder="Nuevo idioma">
                <input type="number" id="calificacionEditar" placeholder="Nueva calificación" min="0" max="10"
                    step="0.1">
                <input type="text" id="ncEditar" placeholder="Nueva clasificación (NC)">

                <button type="submit">Actualizar película</button>

            </form>

        </section>


    </main>

    <script src="api.js"></script>
    <script src="app.js"></script>

    <script>
        // ===================== PESTAÑAS (GUARDAR / ELIMINAR / EDITAR) =====================
        const navLinks = document.querySelectorAll('.nav-links a');
        const vistas = document.querySelectorAll('.vista');

        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {

                const vistaId = link.dataset.vista;

                if (!vistaId) {
                    return;   // REGRESAR no tiene data-vista → salimos aquí y dejamos que el navegador navegue normal
                }

                e.preventDefault();

                navLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                vistas.forEach(v => v.classList.remove('activa'));
                document.getElementById('vista-' + vistaId).classList.add('activa');
            });
        });


        // ===================== BUSCADOR =====================
        // Filtra en vivo los <li> ya renderizados en #listaPeliculas.
        // Busca coincidencias en todo el texto de cada tarjeta (título, género, etc.)
        const buscador = document.getElementById('buscador');
        const lista = document.getElementById('listaPeliculas');
        const sinResultados = document.getElementById('sinResultados');

        buscador.addEventListener('input', () => {
            const termino = buscador.value.trim().toLowerCase();
            const items = lista.querySelectorAll('li');
            let visibles = 0;

            items.forEach(item => {
                const texto = item.textContent.toLowerCase();
                const coincide = texto.includes(termino);
                item.classList.toggle('oculto', !coincide);
                if (coincide) visibles++;
            });

            sinResultados.style.display = (visibles === 0 && items.length > 0) ? 'block' : 'none';
        });

    </script>

</body>

</html>
